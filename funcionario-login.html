<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZibBox - Portal do funcionário</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
    --primary:#4a008c;
    --primary-dark:#2a0054;
    --accent:#00b0ff;
    --danger:#ff5470;
    --bg:#120b1e;
    --surface:#1d1430;
    --border:rgba(255,255,255,0.09);
    --text:#f3f1f9;
    --text-muted:#a79fc0;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:30px 26px;box-shadow:0 20px 50px rgba(0,0,0,0.4);}
.logo-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;}
.logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(155deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent);}
.logo-row h1{font-size:19px;font-weight:800;}
.logo-row h1 span{color:var(--accent);}
.logo-row p{font-size:12.5px;color:var(--text-muted);text-align:center;}
.field{margin-bottom:16px;}
.field label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:500;}
.field input{
    width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);
    background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;
}
.field input:focus{outline:none;border-color:var(--accent);}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;}
.btn:hover{filter:brightness(1.08);}
.btn:disabled{opacity:.6;cursor:default;}
.msg{font-size:12.5px;color:var(--danger);margin-top:12px;text-align:center;min-height:16px;}
.foot-note{margin-top:18px;font-size:11.5px;color:var(--text-muted);text-align:center;}
.foot-note a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>

<div class="card">
    <div class="logo-row">
        <div class="logo-icon"><i class="fa-solid fa-box-open"></i></div>
        <h1>Zib<span>Box</span> — Funcionário</h1>
        <p>Entre com o documento e a senha cadastrados pelo administrador do condomínio para acessar o portal do funcionário.</p>
    </div>

    <div class="field">
        <label>Documento (CPF)</label>
        <input id="loginDocumento" placeholder="Somente números" inputmode="numeric">
    </div>
    <div class="field">
        <label>Senha de acesso</label>
        <input id="loginSenha" type="password" placeholder="••••••••">
    </div>

    <button class="btn" id="btnEntrar"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
    <p class="msg" id="loginMsg"></p>
    <p class="foot-note">Ainda não tem acesso? Peça ao administrador do condomínio para cadastrar seu documento e senha na tela de Funcionários.</p>
</div>

<script>
const btnEntrar = document.getElementById('btnEntrar');
const msgEl = document.getElementById('loginMsg');

async function fazerLogin(){
    const documento = document.getElementById('loginDocumento').value.trim();
    const senha = document.getElementById('loginSenha').value;
    msgEl.textContent = '';
    if(!documento || !senha){
        msgEl.textContent = 'Preencha o documento e a senha.';
        return;
    }
    btnEntrar.disabled = true;
    btnEntrar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';
    try{
        const resp = await fetch('/api/funcionarios/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ documento, senha })
        });
        const data = await resp.json().catch(()=>({}));
        if(!resp.ok || !data.sucesso){
            msgEl.textContent = data.mensagem || 'Não foi possível entrar.';
            return;
        }
        sessionStorage.setItem('funcionarioLogado', JSON.stringify(data.funcionario));
        window.location.href = 'funcionario-painel.html';
    }catch(e){
        console.error(e);
        msgEl.textContent = 'Erro de conexão com o servidor.';
    }finally{
        btnEntrar.disabled = false;
        btnEntrar.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
    }
}

btnEntrar.addEventListener('click', fazerLogin);
document.getElementById('loginSenha').addEventListener('keydown', e=>{ if(e.key==='Enter') fazerLogin(); });

// Se já existe uma sessão de funcionário salva, pula direto para o painel.
if(sessionStorage.getItem('funcionarioLogado')){
    window.location.href = 'funcionario-painel.html';
}
</script>
</body>
</html>
