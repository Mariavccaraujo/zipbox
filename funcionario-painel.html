<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZibBox - Funcionário online</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
    --primary:#4a008c;
    --primary-dark:#2a0054;
    --accent:#00b0ff;
    --danger:#ff5470;
    --bg:#120b1e;
    --surface:#1d1430;
    --surface-2:#241a3a;
    --border:rgba(255,255,255,0.09);
    --text:#f3f1f9;
    --text-muted:#a79fc0;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.wrap{max-width:460px;margin:0 auto;}
.topbar{
    background:var(--accent);color:#fff;padding:16px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    position:sticky;top:0;z-index:10;
}
.topbar .tb-left{display:flex;align-items:center;gap:10px;min-width:0;}
.topbar h3{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar .tb-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.topbar button{background:rgba(255,255,255,0.18);border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:14px;cursor:pointer;flex-shrink:0;}
.topbar button:hover{background:rgba(255,255,255,0.28);}
.body{padding:18px;}
.logged-tag{
    display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:14px 16px;margin-bottom:18px;font-size:13px;
}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);flex-shrink:0;box-shadow:0 0 0 3px rgba(255,84,112,0.15);}
.status-dot.online{background:#2ed573;box-shadow:0 0 0 3px rgba(46,213,115,0.18);}
.section-title{font-size:13px;color:var(--text-muted);font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.online-count{font-size:11.5px;color:#2ed573;font-weight:700;background:rgba(46,213,115,0.12);padding:3px 9px;border-radius:20px;}
.func-card{
    display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:12px 14px;margin-bottom:10px;
}
.func-card img{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--accent);}
.f-info{flex:1;min-width:0;}
.f-info h6{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.f-info p{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.f-status-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.f-status{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.f-status.online{color:#2ed573;}
.f-status.offline{color:var(--text-muted);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;}
.empty-state i{display:block;font-size:22px;margin-bottom:10px;color:var(--accent);opacity:.7;}
.foot-brand{text-align:center;padding:22px 0 4px;font-size:13px;font-weight:800;color:var(--primary-dark);
    background:linear-gradient(155deg,var(--primary),var(--primary-dark));-webkit-background-clip:text;background-clip:text;color:transparent;}
.refresh-hint{text-align:center;font-size:10.5px;color:var(--text-muted);margin-top:2px;padding-bottom:10px;}

/* Encomendas separadas */
.search-box{
    display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
    border-radius:14px;padding:12px 14px;margin-bottom:18px;
}
.search-box i{color:var(--text-muted);font-size:13px;}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:13px;}
.search-box input:focus{outline:none;}
.search-box input::placeholder{color:var(--text-muted);}
.sep-count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sep-count-row .lbl{font-size:13px;color:var(--text-muted);font-weight:600;}
.sep-count-row .num{font-size:13px;font-weight:800;background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px;}
.sep-card{
    background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;
}
.sep-card .sep-ic{
    width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.sep-card .sep-body{flex:1;min-width:0;}
.sep-card .sep-codigo{font-size:12.5px;color:var(--text-muted);margin-bottom:6px;}
.sep-card .sep-codigo b{color:var(--accent);font-weight:700;}
.sep-card .sep-row{font-size:13px;margin-bottom:3px;color:var(--text);}
.sep-card .sep-row span{color:var(--text-muted);}
.sep-card .sep-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.sep-card .sep-date{font-size:11px;color:var(--text-muted);}
.sep-card .sep-btn{
    border:none;background:rgba(0,176,255,0.14);color:var(--accent);font-size:11px;font-weight:700;
    padding:6px 12px;border-radius:20px;cursor:pointer;
}
.sep-card .sep-btn:hover{background:rgba(0,176,255,0.24);}
.view{display:none;}
.view.active{display:block;}
</style>
</head>
<body>

<div class="wrap">
    <div class="topbar">
        <div class="tb-left">
            <button id="btnVoltarPainel" title="Voltar para o painel" style="display:none;"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 id="topbarTitulo">Funcionário — Responsável pela retirada</h3>
        </div>
        <div class="tb-actions">
            <button id="btnIrSeparadas" title="Encomendas separadas"><i class="fa-solid fa-boxes-stacked"></i></button>
            <button id="btnAtualizar" title="Atualizar"><i class="fa-solid fa-arrows-rotate"></i></button>
            <button id="btnSair" title="Sair"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <!-- TELA: PAINEL DE FUNCIONÁRIOS -->
    <div class="body view active" id="viewPainel">
        <div class="logged-tag">
            <span class="status-dot online"></span>
            Usuário logado: <b id="meuNome" style="color:var(--text);">—</b>
        </div>
        <div class="section-title">
            <span>Funcionários</span>
            <span class="online-count" id="onlineCount">0 online</span>
        </div>
        <div id="listaFuncionarios"></div>
        <p class="refresh-hint">Atualiza automaticamente a cada poucos segundos</p>
    </div>

    <!-- TELA: ENCOMENDAS SEPARADAS -->
    <div class="body view" id="viewSeparadas">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscaSeparadas" placeholder="Digite código ou nome do responsável pela retirada">
        </div>
        <div class="sep-count-row">
            <span class="lbl">Encomendas separadas</span>
            <span class="num" id="sepCount">00</span>
        </div>
        <div id="listaSeparadas"></div>
        <p class="refresh-hint">Atualiza automaticamente a cada poucos segundos</p>
    </div>

    <div class="foot-brand">ZibBox</div>
</div>

<script>
const sessaoRaw = sessionStorage.getItem('funcionarioLogado');
if(!sessaoRaw){
    window.location.href = 'funcionario-login.html';
}
const eu = JSON.parse(sessaoRaw || 'null');
if(eu){
    document.getElementById('meuNome').textContent = eu.nome;
}

function initialsAvatar(nome){
    const iniciais = (nome || '?').trim().split(/\s+/).slice(0,2).map(p=> p[0]).join('').toUpperCase();
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'>
        <rect width='100' height='100' rx='50' fill='#4a008c'/>
        <text x='50' y='58' font-size='38' text-anchor='middle' fill='#fff' font-family='Poppins,sans-serif'>${iniciais}</text>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
}

/* ---------------- NAVEGAÇÃO ENTRE TELAS ---------------- */
function irParaTela(tela){
    document.querySelectorAll('.view').forEach(v=> v.classList.remove('active'));
    if(tela === 'separadas'){
        document.getElementById('viewSeparadas').classList.add('active');
        document.getElementById('topbarTitulo').textContent = 'Encomendas separadas';
        document.getElementById('btnVoltarPainel').style.display = 'flex';
        document.getElementById('btnIrSeparadas').style.display = 'none';
        carregarSeparadas();
    } else {
        document.getElementById('viewPainel').classList.add('active');
        document.getElementById('topbarTitulo').textContent = 'Funcionário — Responsável pela retirada';
        document.getElementById('btnVoltarPainel').style.display = 'none';
        document.getElementById('btnIrSeparadas').style.display = 'flex';
        carregarFuncionarios();
    }
}
document.getElementById('btnIrSeparadas').addEventListener('click', ()=> irParaTela('separadas'));
document.getElementById('btnVoltarPainel').addEventListener('click', ()=> irParaTela('painel'));
document.getElementById('btnAtualizar').addEventListener('click', ()=>{
    const naSeparadas = document.getElementById('viewSeparadas').classList.contains('active');
    naSeparadas ? carregarSeparadas() : carregarFuncionarios();
});

/* ---------------- FUNCIONÁRIOS ONLINE ---------------- */
async function carregarFuncionarios(){
    if(!eu) return;
    try{
        const resp = await fetch(`/api/funcionarios/${eu.usuario_id}`);
        const data = await resp.json();
        if(!data.sucesso) return;
        const lista = data.funcionarios;
        const online = lista.filter(f=> f.online).length;
        document.getElementById('onlineCount').textContent = `${online} online`;
        const el = document.getElementById('listaFuncionarios');
        if(!lista.length){
            el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-user-tie"></i>Nenhum funcionário cadastrado ainda.</div>';
            return;
        }
        el.innerHTML = lista.slice().sort((a,b)=> (b.online?1:0)-(a.online?1:0)).map(f=>{
            const foto = f.foto || initialsAvatar(f.nome);
            const souEu = eu && f.id === eu.id;
            return `<div class="func-card">
                <img src="${foto}" alt="${f.nome}">
                <div class="f-info">
                    <h6>${f.cargo || 'Responsável'}${souEu ? ' (você)' : ''}</h6>
                    <p>${f.nome}</p>
                </div>
                <div class="f-status-wrap">
                    <span class="status-dot ${f.online ? 'online' : ''}"></span>
                    <span class="f-status ${f.online ? 'online' : 'offline'}">${f.online ? 'Online' : 'Offline'}</span>
                </div>
            </div>`;
        }).join('');
    }catch(e){ console.error('Erro ao carregar funcionários:', e); }
}

/* ---------------- ENCOMENDAS SEPARADAS ---------------- */
let separadasCache = [];

async function carregarSeparadas(){
    if(!eu) return;
    try{
        const resp = await fetch(`/api/encomendas/${eu.usuario_id}`);
        const data = await resp.json();
        if(!data.sucesso) return;
        separadasCache = data.encomendas.filter(e=> e.status === 'aguardando');
        renderSeparadas();
    }catch(e){ console.error('Erro ao carregar encomendas separadas:', e); }
}

function renderSeparadas(){
    const termo = document.getElementById('buscaSeparadas').value.trim().toLowerCase();
    let lista = separadasCache.slice().reverse();
    if(termo){
        lista = lista.filter(e=>
            String(e.codigo).includes(termo) ||
            (e.responsavelRetirada || '').toLowerCase().includes(termo) ||
            (e.nome || '').toLowerCase().includes(termo)
        );
    }
    document.getElementById('sepCount').textContent = String(lista.length).padStart(2, '0');
    const el = document.getElementById('listaSeparadas');
    if(!lista.length){
        el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i>Nenhuma encomenda separada aguardando retirada.</div>';
        return;
    }
    el.innerHTML = lista.map(e=>`
        <div class="sep-card" data-codigo="${e.codigo}">
            <div class="sep-ic"><i class="fa-solid fa-box"></i></div>
            <div class="sep-body">
                <div class="sep-codigo">Código: <b>${e.codigo}</b></div>
                <div class="sep-row"><span>Responsável:</span> ${e.responsavelRetirada || '—'}</div>
                <div class="sep-row"><span>Recebedor:</span> ${e.nome || '—'}</div>
                <div class="sep-row"><span>Tipo:</span> ${e.tipo || '—'}</div>
                <div class="sep-foot">
                    <span class="sep-date">${e.ts || ''}</span>
                    <button class="sep-btn" data-retirar><i class="fa-solid fa-check"></i> Confirmar retirada</button>
                </div>
            </div>
        </div>
    `).join('');
    el.querySelectorAll('[data-retirar]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
            const codigo = parseInt(btn.closest('.sep-card').dataset.codigo);
            btn.disabled = true;
            btn.textContent = 'Confirmando...';
            try{
                await fetch('/api/encomendas/retirar', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ codigos:[codigo], retiradoPor: eu.nome })
                });
                await carregarSeparadas();
            }catch(err){
                console.error('Erro ao confirmar retirada:', err);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Confirmar retirada';
            }
        });
    });
}
document.getElementById('buscaSeparadas').addEventListener('input', renderSeparadas);

document.getElementById('btnSair').addEventListener('click', async ()=>{
    if(!eu) { window.location.href = 'funcionario-login.html'; return; }
    try{
        await fetch(`/api/funcionarios/${eu.id}/logout`, { method:'POST' });
    }catch(e){ console.error(e); }
    sessionStorage.removeItem('funcionarioLogado');
    window.location.href = 'funcionario-login.html';
});

carregarFuncionarios();
setInterval(()=>{
    const naSeparadas = document.getElementById('viewSeparadas').classList.contains('active');
    naSeparadas ? carregarSeparadas() : carregarFuncionarios();
}, 6000);

// Marca offline automaticamente se a aba/janela for fechada.
window.addEventListener('beforeunload', ()=>{
    if(eu){
        navigator.sendBeacon(`/api/funcionarios/${eu.id}/logout`, new Blob([], {type:'application/json'}));
    }
});
</script>
</body>
</html>
